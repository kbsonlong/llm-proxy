services:
  postgres:
    image: agnohq/pgvector:18
    container_name: litellm-postgres
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  litellm-proxy:
    image: registry.cn-hangzhou.aliyuncs.com/seam/litellm:main-latest
    container_name: litellm-proxy
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./config.gen.yaml:/app/config.gen.yaml:ro
      - ./tracker.py:/app/tracker.py:ro
      - ./token_limits.yaml:/app/token_limits.yaml:ro
      - ./litellm_token_usage.json:/root/.litellm_token_usage.json
    env_file:
      - .env
    environment:
      LITELLM_MASTER_KEY: "${LITELLM_MASTER_KEY}"
      VOLCENGINE_API_KEY: "${VOLCENGINE_API_KEY}"
      TOKEN_TRACK_MODE: "${TOKEN_TRACK_MODE:-APPEND}"
      TOKEN_DB_PATH: "/root/.litellm_token_usage.json"
      TOKEN_LIMITS_PATH: "/app/token_limits.yaml"
      DATABASE_URL: "postgresql://litellm:litellm@postgres:5432/litellm"
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  sync-endpoints:
    build:
      dockerfile: Dockerfile.sync
    container_name: sync-endpoints
    ports:
      - "9100:9100"
    volumes:
      - ./config.gen.yaml:/app/config.gen.yaml
      - ./config.yaml:/app/config.yaml
    env_file:
      - .env
    environment:
      VOLC_AK: "${VOLC_AK}"
      VOLC_SK: "${VOLC_SK}"
    command:
      - "--serve"
      - "--port"
      - "9100"
      - "--interval"
      - "3600"
      - "--merge"
      - "/app/config.yaml"
      - "-o"
      - "/app/config.yaml"
    restart: unless-stopped
    depends_on:
      - litellm-proxy

volumes:
  postgres_data:
